---
name: "cicd"

env:
  SOPS_AGE_KEY: "${{ secrets.SOPS_AGE_KEY }}"
  # `pr-123` for PRs, `production` for master
  ENVIRONMENT: >-
    ${{ github.event.pull_request.number
    && format('pr-{0}', github.event.pull_request.number)
    || (github.ref_name == 'master' && 'production' || github.ref_name) }}

"on":
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: "${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: false

jobs:
  lint-test-deploy:
    runs-on: "ubuntu-latest"
    permissions:
      packages: "write"
    env:
      RAILS_MASTER_KEY: "${{ secrets.RAILS_MASTER_KEY }}"
      KAMAL_REGISTRY_PASSWORD: "${{ secrets.GITHUB_TOKEN }}"
      KAMAL_REGISTRY_USERNAME: "${{ github.actor }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"
        with:
          submodules: "recursive"

      - uses: "jdx/mise-action@v4.0.1"
        with:
          version: "2026.3.1"

      - name: "Mask secrets"
        run: "just secrets-mask"

      - name: "Cache Ruby gems"
        uses: "actions/cache@v5"
        with:
          path: "vendor/bundle"
          key: "${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}"
          restore-keys: |
            "${{ runner.os }}-gems-"

      - name: "Cache Python uv dependencies"
        uses: "actions/cache@v5"
        with:
          path: "~/.cache/uv"
          key: >-
            ${{ runner.os }}-uv-${{
            hashFiles('infrastructure/ansible/uv.lock') }}
          restore-keys: >-
            ${{ runner.os }}-uv-

      # Needed for ansible to be able to ssh into the servers
      - name: "Start ssh-agent"
        shell: "bash"
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: "Run checks and deploy"
        run: |
          # Make bundler use our cached gems
          bundle config set --local path vendor/bundle
          just install
          # just lint
          # just test
          just deploy "${{ env.ENVIRONMENT }}"
