---
name: "cicd"

env:
  SOPS_AGE_KEY: "${{ secrets.SOPS_AGE_KEY }}"
  # `pr-123` for PRs, `production` for master
  ENVIRONMENT: >-
    ${{ github.event.pull_request.number
    && format('pr-{0}', github.event.pull_request.number)
    || (github.ref_name == 'master' && 'production' || github.ref_name) }}

"on":
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: "${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: false

jobs:
  lint-test-deploy:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "write"
    env:
      RAILS_MASTER_KEY: "${{ secrets.RAILS_MASTER_KEY }}"
      KAMAL_REGISTRY_PASSWORD: "${{ secrets.GITHUB_TOKEN }}"
      KAMAL_REGISTRY_USERNAME: "${{ github.actor }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"
        with:
          submodules: "recursive"

      - uses: "jdx/mise-action@v4.0.1"
        with:
          version: "2026.3.1"

      - name: "Mask secrets"
        run: "just secrets-mask"

      - name: "Cache Ruby gems"
        uses: "actions/cache@v5"
        with:
          path: "vendor/bundle"
          key: "${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}"
          restore-keys: |
            "${{ runner.os }}-gems-"

      - name: "Cache Python uv dependencies"
        uses: "actions/cache@v5"
        with:
          path: "~/.cache/uv"
          key: >-
            ${{ runner.os }}-uv-${{
            hashFiles('infrastructure/ansible/uv.lock') }}
          restore-keys: >-
            ${{ runner.os }}-uv-

      - name: "Cache tflint plugins"
        uses: "actions/cache@v5"
        with:
          path: "~/.tflint.d"
          key: >-
            ${{ runner.os }}-tflint-${{
            hashFiles('infrastructure/tofu/.tflint.hcl') }}

      - name: "Cache OpenTofu providers"
        uses: "actions/cache@v5"
        with:
          path: "infrastructure/tofu/.terraform"
          key: >-
            ${{ runner.os }}-tofu-${{
            hashFiles('infrastructure/tofu/.terraform.lock.hcl') }}

      # Needed for ansible to be able to ssh into the servers
      - name: "Start ssh-agent"
        shell: "bash"
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # Needed for Kamal's GHA docker build cache
      - uses: "docker/setup-buildx-action@v4"
      - uses: "crazy-max/ghaction-github-runtime@v4"

      - name: "Run checks and deploy"
        run: |
          # Make bundler use our cached gems
          bundle config set --local path vendor/bundle
          just install
          # just lint
          # just test
          just deploy "${{ env.ENVIRONMENT }}"

  tag_release:
    needs: "lint-test-deploy"
    if: "github.ref_name == 'master'"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
    steps:
      - uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Get production version using todays date"
        id: "production_version"
        run: |
          echo "VERSION=production$(date '+%Y%m%dt%H%M%S')" >> $GITHUB_OUTPUT

      - name: "Create tag"
        uses: "rickstaa/action-create-tag@v1"
        with:
          tag: "${{ steps.production_version.outputs.VERSION }}"
