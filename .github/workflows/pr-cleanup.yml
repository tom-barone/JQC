---
name: "pr cleanup"

env:
  SOPS_AGE_KEY: "${{ secrets.SOPS_AGE_KEY }}"
  ENVIRONMENT: "${{ format('pr-{0}', github.event.pull_request.number) }}"

"on":
  pull_request:
    branches: ["master"]
    types: ["closed"]

concurrency:
  group: "${{ github.head_ref }}"
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"
        with:
          submodules: "recursive"

      - uses: "jdx/mise-action@v4.0.1"
        with:
          cache_key: "mise-{{platform}}-{{version}}-{{file_hash}}"
          version: "2026.3.1"
        env:
          # We seem to keep timing out here during the CICD runs,
          # so try increasing the timeout 4x to 120s (default was 20s)
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: "120s"
          # Unauthenticated GitHub API requests from shared runner IPs
          # get rate limited and hang, so authenticate them
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Mask secrets"
        run: "just secrets-mask"

      - name: "Destroy infrastructure"
        run: |
          just destroy "${{ env.ENVIRONMENT }}"
