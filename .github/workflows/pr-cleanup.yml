---
name: "pr cleanup"

env:
  SOPS_AGE_KEY: "${{ secrets.SOPS_AGE_KEY }}"
  ENVIRONMENT: "${{ format('pr-{0}', github.event.pull_request.number) }}"

"on":
  pull_request:
    branches: ["master"]
    types: ["closed"]

concurrency:
  group: "${{ github.head_ref }}"
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"
        with:
          submodules: "recursive"

      - uses: "jdx/mise-action@v4.0.1"
        with:
          version: "2026.3.1"

      - name: "Mask secrets"
        run: "just secrets-mask"

      - name: "Destroy infrastructure"
        run: |
          just destroy "${{ env.ENVIRONMENT }}"
